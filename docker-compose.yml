services:
  nomad-brain:
    build: .
    container_name: nomad-brain-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
      - COUCHDB_DB_NAME=${COUCHDB_DB_NAME:-obsidian-livesync}
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - ./vault:/app/vault
    depends_on:
      couchdb:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  couchdb:
    image: couchdb:3
    container_name: nomad-brain-couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb-data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini
    ports:
      - "127.0.0.1:5984:5984"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://${COUCHDB_USER}:${COUCHDB_PASSWORD}@localhost:5984/_up || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: nomad-brain-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  couchdb-data:
  qdrant-data:
