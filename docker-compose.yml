services:
  nomad-brain:
    build: .
    container_name: nomad-brain-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./vault:/app/vault
    depends_on:
      - couchdb

  couchdb:
    image: couchdb:3
    container_name: nomad-brain-couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb-data:/opt/couchdb/data
    ports:
      - "5984:5984"

volumes:
  couchdb-data:
