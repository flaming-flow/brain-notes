services:
  nomad-brain:
    build: .
    container_name: nomad-brain-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
      - COUCHDB_DB_NAME=${COUCHDB_DB_NAME:-obsidian-livesync}
    volumes:
      - ./vault:/app/vault
    depends_on:
      couchdb:
        condition: service_healthy

  couchdb:
    image: couchdb:3
    container_name: nomad-brain-couchdb
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-changeme}
    volumes:
      - couchdb-data:/opt/couchdb/data
      - ./couchdb/local.ini:/opt/couchdb/etc/local.d/local.ini
    ports:
      - "5984:5984"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5984/_up || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  couchdb-data:
